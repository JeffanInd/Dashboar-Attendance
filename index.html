<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Perusahaan</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div id="loginPage">
   <div class="login-box">
    <img  src="https://link-gambar-logo-perusahaan.com/logo.png" class="company-logo" alt="Company Logo">                  
    <h2>Login Dashboard</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
   <p id="loginInfo"></p>
 </div>
</div>
<div id="dashboard" style="display:none;">
<div class="sidebar">
<h2>COMPANY</h2>
<button onclick="loadDashboard()">
<i class="fa-solid fa-chart-line"></i> Dashboard
</button>
<button onclick="showUtilities()">
<i class="fa-solid fa-screwdriver-wrench"></i> Utilities
</button>
<button onclick="showAttendance()">
<i class="fa-solid fa-user-check"></i> Attendance
</button>
<button onclick="showKoperasi()">
<i class="fa-solid fa-building-columns"></i> Koperasi
</button>
<button onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</button>
</div>
<div class="main">
<header>
<div class="company">
<h2>PT. NAMA PERUSAHAAN</h2>
<span>Sistem Informasi Dashboard Perusahaan</span>
</div>
  <div class="header-right">
    <div class="clock" id="clock">
        <div class="time"></div>
        <div class="datetime"></div>
        <b id="loginName">User :</b>
    </div>
</div>
</header>
<div id="content">
<div class="card">
<h2>Selamat Datang</h2>
<p>Selamat datang di Dashboard Perusahaan.</p>
<p>Silakan pilih menu pada sidebar untuk mengelola data.</p>
</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
