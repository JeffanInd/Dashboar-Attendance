<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Perusahaan</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div id="loginPage">
    <div class="login-box">
        <img src="https://link-gambar-logo-perusahaan.com/logo.png" 
             class="company-logo" 
             alt="Company Logo">
        <h2>Login Dashboard</h2>
        <input id="email" type="email" placeholder="Email">
        <div class="password-box">
            <input id="password" type="password" placeholder="Password">
            <span id="togglePassword" class="eye">👁</span>
        </div>
        <button onclick="login()">Login</button>
        <p id="loginInfo"></p>
    </div>
</div>
<div id="dashboard" style="display:none;">
<div class="sidebar">
    <h2>COMPANY</h2>
    <!-- Dashboard -->
    <button onclick="loadDashboard()">
        <i class="fa-solid fa-chart-line"></i> Dashboard
    </button>
    <!-- Utilities -->
    <button class="menu-btn" onclick="toggleMenu('utilitiesMenu')">
        <span>
            <i class="fa-solid fa-screwdriver-wrench"></i>
            Utilities
        </span>
        <i class="fa-solid fa-chevron-down"></i>
    </button>
    <div class="submenu" id="utilitiesMenu">
        <button onclick="showAddEmployee()">
            <i class="fa-solid fa-user-plus"></i> Add Employee
        </button>
        <button onclick="showDataEmployee()">
           <i class="fa-solid fa-id-card"></i> Data Employee
        </button>
    </div>
    <!-- Attendance -->
    <button class="menu-btn" onclick="toggleMenu('attendanceMenu')">
        <span><i class="fa-solid fa-user-check"></i> Attendance </span>
        <i class="fa-solid fa-chevron-down"></i>
    </button>
    <div class="submenu" id="attendanceMenu">
        <button onclick="showInputAttendance()">
            <i class="fa-solid fa-pen"></i> Input Attendance
        </button>
        <button onclick="showDataAttendance()">
            <i class="fa-solid fa-table"></i> Data Attendance
        </button>
        <button onclick="showSalary()">
            <i class="fa-solid fa-money-bill"></i> Data Salary
        </button>
    </div>
    <!-- Koperasi -->
    <button class="menu-btn" onclick="toggleMenu('koperasiMenu')">
        <span>
            <i class="fa-solid fa-building-columns"></i>
            Koperasi
        </span>
        <i class="fa-solid fa-chevron-down"></i>
    </button>
    <div class="submenu" id="koperasiMenu">
        <button onclick="showAddAnggota()">
            <i class="fa-solid fa-user-plus"></i> Add Anggota
        </button>
        <button onclick="showInputSimpanan()">
            <i class="fa-solid fa-piggy-bank"></i> Input Simpanan
        </button>
        <button onclick="showInputPinjaman()">
            <i class="fa-solid fa-hand-holding-dollar"></i> Input Pinjaman
        </button>
        <button onclick="showDataSimpanan()">
            <i class="fa-solid fa-database"></i> Data Simpanan
        </button>
        <button onclick="showDataPinjaman()">
            <i class="fa-solid fa-file-invoice-dollar"></i> Data Pinjaman
        </button>
        <button onclick="showNeraca()">
            <i class="fa-solid fa-scale-balanced"></i> Neraca
        </button>
    </div>
    <!-- Logout -->
    <button onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
    <!-- Admin -->
    <button onclick="goToAdmin()">
    <i class="fa-solid fa-user-shield"></i> Admin
    </button>
</div>
<div class="main"><header>
<div class="company">
<h2>PT. NAMA PERUSAHAAN</h2>
<span>Sistem Informasi Dashboard Perusahaan</span>
</div>
  <div class="header-right">
    <div class="clock" id="clock">
        <div class="time"></div>
        <div class="datetime"></div>
        <b id="loginName">User :</b>
    </div>
</div>
</header>
<div id="content">
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
